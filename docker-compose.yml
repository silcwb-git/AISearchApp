version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
    networks:
      - aisearch-network

  webapi:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - AI__ApiKey=${OPENAI_API_KEY}
      - AI__BaseUrl=https://api.openai.com
      - Qdrant__Url=http://qdrant:6333
      - Qdrant__CollectionName=documents
    depends_on:
      - qdrant
    networks:
      - aisearch-network

  frontend:
    build:
      context: ./src/AISearchApp.Frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - webapi
    networks:
      - aisearch-network

volumes:
  qdrant_storage:

networks:
  aisearch-network:
    driver: bridge